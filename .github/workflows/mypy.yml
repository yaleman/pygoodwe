---
name: mypy

"on":
  push:
    branches:
      - main
  pull_request:

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Running mypy
        run: |
          echo 'args = {}' > config.py
          python -m pip install --quiet --no-cache-dir --upgrade uv
          uv run mypy $(basename $(pwd) | sed -E 's/-/_/g') tests/ examples/
          uv run ty check
